services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: r2
      POSTGRES_PASSWORD: r2password
      POSTGRES_DB: r2online
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U r2 -d r2online"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  login:
    build:
      context: .
      target: login
    env_file: .env
    environment:
      DB_DSN: postgres://r2:r2password@postgres:5432/r2online?sslmode=disable
      REDIS_ADDR: redis:6379
    ports:
      - "2000:2000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  game:
    build:
      context: .
      target: game
    env_file: .env
    environment:
      DB_DSN: postgres://r2:r2password@postgres:5432/r2online?sslmode=disable
      REDIS_ADDR: redis:6379
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
